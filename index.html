];

const SYMBOLS = {

shield:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>`,

staff:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><path d="M14 2v20M10 2v20M14 2c0-2-4-2-4 0"/></svg>`,

lion:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-full h-full"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/></svg>`,

};

const CARD_COLORS = {
    gold: { bg: 'bg-[#D4A017]', text: 'text-[#D4A017]' },
    red: { bg: 'bg-[#C62828]', text: 'text-[#C62828]' },
    blue: { bg: 'bg-[#1565C0]', text: 'text-[#1565C0]' },
    green: { bg: 'bg-[#2E7D32]', text: 'text-[#2E7D32]' },
    cream: { bg: 'bg-[#8D6E63]', text: 'text-[#8D6E63]' }
};

let state = {
    name: '', best: 0, score: 0, deck: [], idx: 0, guesses: 0, flipped: false, processing: false, hints: 0
};

let db = null;
let isOffline = false;
let typeTimer = null;
let unsubLeaderboard = null;

function init() {
    try {
        if (firebaseConfig.apiKey !== "YOUR_FIREBASE_API_KEY") {
            firebase.initializeApp(firebaseConfig);
            db = firebase.firestore();
        } else isOffline = true;
    } catch (e) { isOffline = true; }

    document.getElementById('btn-start').onclick = login;
    document.getElementById('player-name-input').onkeypress = e => e.key === 'Enter' && login();
    document.getElementById('btn-guess').onclick = guess;
    document.getElementById('guess-input').onkeypress = e => e.key === 'Enter' && guess();
    document.getElementById('btn-hint').onclick = hint;
    document.getElementById('btn-skip').onclick = skip;
    document.getElementById('btn-show-leaderboard').onclick = showLeaderboard;
    document.getElementById('btn-close-leaderboard').onclick = hideLeaderboard;
    document.getElementById('btn-close-leaderboard-bottom').onclick = hideLeaderboard;

    const saved = localStorage.getItem('bible_guess_player');
    if (saved) document.getElementById('player-name-input').value = saved;
}

function toast(msg, type = 'info') {
    const el = document.getElementById('toast');
    document.getElementById('toast-msg').innerText = msg;
    document.getElementById('toast-icon').innerText = type === 'success' ? '✅' : type === 'error' ? '❌' : type === 'warning' ? '⚠️' : '💡';
    el.classList.remove('opacity-0', '-translate-y-4');
    setTimeout(() => el.classList.add('opacity-0', '-translate-y-4'), 3000);
}

async function login() {
    const name = document.getElementById('player-name-input').value.trim();
    if (!name) return toast("請輸入名稱先啦！", "warning");

    state.name = name;
    localStorage.setItem('bible_guess_player', name);
    
    const btn = document.getElementById('btn-start');
    btn.innerHTML = '<span class="animate-pulse">連接中...</span>';
    btn.disabled = true;

    if (!isOffline && db) {
        try {
            const ref = db.collection('players').doc(name);
            const doc = await ref.get();
            if (doc.exists) {
                state.best = doc.data().bestScore || 0;
                toast(`歡迎返嚟，${name}！`, "success");
            } else {
                await ref.set({
                    playerName: name, joinedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    lastPlayed: firebase.firestore.FieldValue.serverTimestamp(), totalGames: 0, totalScore: 0, bestScore: 0
                });
                toast(`歡迎新玩家，${name}！`, "success");
            }
        } catch (e) {
            toast("網絡錯誤，轉為離線模式", "warning");
            isOffline = true;
        }
    } else toast(`離線模式開始，歡迎 ${name}！`, "info");

    document.getElementById('display-player-name').innerText = state.name;
    document.getElementById('player-avatar').innerText = state.name.charAt(0).toUpperCase();
    document.getElementById('display-best-score').innerText = state.best;
    
    start();
}

async function saveRecord(card, pts, isSkip) {
    if (isOffline || !db) return;
    try {
        await db.collection('gameRecords').add({
            playerName: state.name, cardId: card.id, cardName: card.name_zh,
            guessCount: isSkip ? 0 : (state.guesses + 1), score: pts,
            usedHint: state.hints > 0, hintCount: state.hints,
            playedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        const ref = db.collection('players').doc(state.name);
        const newBest = Math.max(state.best, state.score);
        
        await ref.update({
            lastPlayed: firebase.firestore.FieldValue.serverTimestamp(),
            totalGames: firebase.firestore.FieldValue.increment(1),
            totalScore: firebase.firestore.FieldValue.increment(pts),
            bestScore: newBest
        });

        if (state.score > state.best) {
            state.best = state.score;
            document.getElementById('display-best-score').innerText = state.best;
            await db.collection('leaderboard').doc(state.name).set({
                playerName: state.name, bestScore: state.best,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
        }
    } catch (e) {}
}

function start() {
    document.getElementById('screen-login').classList.add('hidden');
    document.getElementById('screen-game').classList.remove('hidden');
    state.deck = [...CARDS].sort(() => Math.random() - 0.5);
    state.idx = 0; state.score = 0;
    document.getElementById('current-score').innerText = state.score;
    load();
}

function load() {
    if (state.idx >= state.deck.length) {
        toast("恭喜！你已經玩完所有卡牌！", "success");
        setTimeout(() => {
            document.getElementById('screen-game').classList.add('hidden');
            document.getElementById('screen-login').classList.remove('hidden');
            document.getElementById('btn-start').innerHTML = '再玩一次 →';
            document.getElementById('btn-start').disabled = false;
        }, 3000);
        return;
    }

    const card = state.deck[state.idx];
    state.guesses = 0; state.hints = 0; state.flipped = false; state.processing = false;

    document.getElementById('card-inner').classList.remove('card-flipped');
    document.getElementById('guess-input').value = '';
    document.getElementById('guess-input').disabled = false;
    document.getElementById('btn-guess').disabled = false;
    document.getElementById('btn-hint').disabled = false;
    document.getElementById('btn-skip').disabled = false;
    
    if(typeTimer) clearTimeout(typeTimer);
    document.getElementById('hint-text').innerHTML = '準備好就開始估啦！';
    document.getElementById('hint-text').classList.remove('typing-cursor');
    
    const dots = document.getElementById('tries-indicator').children;
    for(let i=0; i<3; i++) dots[i].className = "w-2.5 h-2.5 rounded-full bg-primary shadow-[0_0_8px_rgba(246,190,57,0.8)] transition-all duration-300";

    const cConf = CARD_COLORS[card.card_color] || CARD_COLORS.cream;
    document.getElementById('card-top-bar').className = `h-10 w-full flex justify-between items-center px-4 text-white text-xs font-bold tracking-widest shadow-md z-10 ${cConf.bg}`;
    document.getElementById('card-type-text').innerText = card.card_type;
    document.getElementById('card-symbol').innerHTML = SYMBOLS[card.symbol] || SYMBOLS.star;
    document.getElementById('card-symbol').className = `w-16 h-16 opacity-80 ${cConf.text}`;
    document.getElementById('card-identity').innerText = card.identity;
    document.getElementById('card-relationship').innerText = card.relationship;
    document.getElementById('card-achievement').innerText = card.achievement;
    document.getElementById('answer-name-zh').innerText = card.name_zh;
    document.getElementById('answer-name-en').innerText = card.name_en;
    document.getElementById('answer-note').innerText = card.note;
    document.getElementById('card-symbol-back').innerHTML = SYMBOLS[card.symbol] || SYMBOLS.star;
}

function guess() {
    if (state.processing || state.flipped) return;
    const input = document.getElementById('guess-input').value.trim().toLowerCase();
    if (!input) return;

    const card = state.deck[state.idx];
    const isCorrect = input === card.name_zh || input === card.name_en.toLowerCase();
    state.processing = true;

    if (isCorrect) {
        let pts = state.guesses === 0 ? 100 : state.guesses === 1 ? 60 : 30;
        state.score += pts;
        document.getElementById('current-score').innerText = state.score;
        toast(`答對啦！+${pts}分`, "success");
        flip(true);
        particles();
        saveRecord(card, pts, false);
        setTimeout(() => { state.idx++; load(); }, 3500);
    } else {
        state.guesses++;
        document.getElementById('tries-indicator').children[state.guesses - 1].className = "w-2.5 h-2.5 rounded-full bg-white/20 transition-all duration-300";
        const c = document.getElementById('card-container');
        c.classList.remove('animate-float'); c.classList.add('animate-shake');
        setTimeout(() => { c.classList.remove('animate-shake'); c.classList.add('animate-float'); state.processing = false; }, 400);

        if (state.guesses >= 3) {
            toast("機會用盡啦！", "error");
            document.getElementById('guess-input').disabled = true;
            flip(false);
            saveRecord(card, 0, false);
            setTimeout(() => { state.idx++; load(); }, 4000);
        } else {
            toast(`唔係呢個人，仲有 ${3 - state.guesses} 次機會！`, "warning");
            document.getElementById('guess-input').value = '';
            document.getElementById('guess-input').focus();
        }
    }
}

function skip() {
    if (state.processing || state.flipped) return;
    state.processing = true;
    toast("跳過呢張", "info");
    flip(false);
    saveRecord(state.deck[state.idx], 0, true);
    setTimeout(() => { state.idx++; load(); }, 3000);
}

function flip(success) {
    state.flipped = true;
    document.getElementById('card-inner').classList.add('card-flipped');
    document.getElementById('guess-input').disabled = true;
    document.getElementById('btn-guess').disabled = true;
    document.getElementById('btn-hint').disabled = true;
    document.getElementById('btn-skip').disabled = true;
    if (!success) document.getElementById('card-back').classList.add('brightness-75');
    else document.getElementById('card-back').classList.remove('brightness-75');
}

function particles() {
    const c = document.getElementById('particles-container');
    const r = document.getElementById('card-container').getBoundingClientRect();
    const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
    for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = `${cx}px`; p.style.top = `${cy}px`;
        const a = Math.random() * Math.PI * 2, d = 100 + Math.random() * 150;
        p.style.setProperty('--tx', `${Math.cos(a) * d}px`);
        p.style.setProperty('--ty', `${Math.sin(a) * d}px`);
        p.style.animation = `explode 0.8s cubic-bezier(0.1, 0.8, 0.3, 1) forwards`;
        c.appendChild(p);
        setTimeout(() => p.remove(), 800);
    }
}

function type(el, txt, spd = 50) {
    if(typeTimer) clearTimeout(typeTimer);
    el.innerHTML = ''; el.classList.add('typing-cursor');
    let i = 0;
    function t() {
        if (i < txt.length) { el.innerHTML += txt.charAt(i); i++; typeTimer = setTimeout(t, spd); }
        else el.classList.remove('typing-cursor');
    }
    t();
}

async function hint() {
    if (state.processing || state.flipped) return;
    const card = state.deck[state.idx];
    const el = document.getElementById('hint-text');
    state.hints++;
    
    if (state.hints === 1) type(el, `💡 提示一：${card.hint_easy}`);
    else if (state.hints === 2) type(el, `💡 提示二：${card.hint_medium}`);
    else if (state.hints === 3) {
        document.getElementById('btn-hint').disabled = true;
        el.innerHTML = '<span class="animate-pulse">祈求神諭中...</span>';
        if (GEMINI_API_KEY === "YOUR_GEMINI_API_KEY_HERE" || !GEMINI_API_KEY) {
            type(el, `💡 終極提示：${card.hint_hard}`); return;
        }
        try {
            const prompt = `你係一個聖經知識遊戲嘅提示生成器。請用繁體中文（香港口語）為以下聖經人物生成一個謎語提示。提示必須：1）唔可以直接說出人物嘅名字；2）長度係20-40個字；3）描述一個佢生命中嘅獨特事件；4）用生動有趣嘅方式表達。\n\n人物資料：\n姓名：${card.name_zh}\n身份：${card.identity}\n成就：${card.achievement}\n\n請直接輸出提示，唔需要任何前言或解釋。`;
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { temperature: 0.7, maxOutputTokens: 100 } })
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            type(el, `✨ 神諭：${data.candidates[0].content.parts[0].text.trim()}`);
        } catch (e) { type(el, `💡 終極提示：${card.hint_hard}`); }
    }
}

function showLeaderboard() {
    document.getElementById('screen-leaderboard').classList.remove('hidden');
    document.getElementById('screen-leaderboard').classList.add('flex');
    const tbody = document.getElementById('leaderboard-body');
    
    if (isOffline || !db) {
        tbody.innerHTML = `<tr><td colspan="3" class="text-center p-8 text-white/50 text-sm">離線模式無法查看排行榜</td></tr>`;
        return;
    }

    tbody.innerHTML = `<tr><td colspan="3" class="text-center p-8 text-white/50 text-sm">載入中...</td></tr>`;
    
    unsubLeaderboard = db.collection('leaderboard').orderBy('bestScore', 'desc').limit(10).onSnapshot(snap => {
        tbody.innerHTML = '';
        if (snap.empty) {
            tbody.innerHTML = `<tr><td colspan="3" class="text-center p-8 text-white/50 text-sm">暫時無記錄</td></tr>`;
            return;
        }
        let rank = 1;
        snap.forEach(doc => {
            const data = doc.data();
            const isMe = data.playerName === state.name;
            const rankStr = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
            const rowClass = isMe ? 'bg-primary/10 border border-primary/20 outline outline-1 outline-primary/30 rounded-xl' : (rank <= 3 ? 'bg-surfaceContainer/50 rounded-xl' : 'bg-surfaceContainer/20');
            const textClass = isMe ? 'text-primary font-black' : 'text-white/80';
            
            const tr = document.createElement('tr');
            tr.className = rowClass;
            tr.innerHTML = `
                <td class="py-3 pl-4 rounded-l-xl ${isMe ? 'font-bold text-primary' : 'text-white/60'}">${rankStr}</td>
                <td class="py-3 ${textClass}">${data.playerName} ${isMe ? '(您)' : ''}</td>
                <td class="py-3 pr-4 text-right rounded-r-xl font-cinzel ${isMe ? 'font-black text-primary' : 'font-bold text-white/80'}">${data.bestScore}</td>
            `;
            tbody.appendChild(tr);
            rank++;
        });
    }, err => {
        tbody.innerHTML = `<tr><td colspan="3" class="text-center p-8 text-red-400 text-sm">讀取失敗</td></tr>`;
    });
}

function hideLeaderboard() {
    document.getElementById('screen-leaderboard').classList.add('hidden');
    document.getElementById('screen-leaderboard').classList.remove('flex');
    if (unsubLeaderboard) { unsubLeaderboard(); unsubLeaderboard = null; }
}

window.onload = init;
</script>
</body>
